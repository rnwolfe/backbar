; Backbar — ESP32-S3 fleet node firmware.
; HX711-per-cell + MQTT pub of settle-detected readings.
; Detail spec: ../../specs/firmware.md (to be authored alongside task-008).

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
  -DCORE_DEBUG_LEVEL=3
lib_deps =
  knolleary/PubSubClient @ ^2.8
  bblanchon/ArduinoJson @ ^7.1.0
  bogde/HX711 @ ^0.7.5
