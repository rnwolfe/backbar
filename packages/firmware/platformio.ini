; Backbar — fleet node firmware.
; HX711-per-cell + MQTT pub of settle-detected readings.
; Detail spec: ../../specs/firmware.md + ../../specs/calibration.md.
;
; Two supported board targets — same main.cpp, platform-specific bits guarded
; by #ifdef. Build with `pio run -e <env>` or set default below.

[platformio]
default_envs = uno_r4_wifi

; ── Arduino Uno R4 WiFi (Renesas RA4M1 + onboard ESP32-S3 Wi-Fi co-pro). ──
; Persistence: built-in EEPROM library (8 KB on-chip).
; Wi-Fi:       WiFiS3 library (talks to the co-processor over UART).
[env:uno_r4_wifi]
platform = renesas-ra
board = uno_r4_wifi
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
  knolleary/PubSubClient @ ^2.8
  bblanchon/ArduinoJson @ ^7.1.0
  bogde/HX711 @ ^0.7.5
build_flags =
  -DBACKBAR_BOARD_UNO_R4=1

; ── Espressif ESP32-S3 DevKitC-1. Kept buildable so the original target
; stays alive (single-host bare-metal firmware projects rot fast otherwise).
; Persistence: NVS via Preferences.
; Wi-Fi:       on-chip via WiFi library.
[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DBACKBAR_BOARD_ESP32=1
lib_deps =
  knolleary/PubSubClient @ ^2.8
  bblanchon/ArduinoJson @ ^7.1.0
  bogde/HX711 @ ^0.7.5
